# Claude-Flow Deep Regression Test Suite
# Docker Compose orchestration for comprehensive testing

version: '3.8'

services:
  # Main test runner
  test-runner:
    build:
      context: ../..
      dockerfile: tests/docker-regression/Dockerfile
    container_name: cortex-agent-test-runner
    volumes:
      - test-data:/app/data
      - test-reports:/app/reports
      - test-logs:/app/logs
    environment:
      - NODE_ENV=test
      - CORTEX_AGENT_MODE=test
      - CORTEX_AGENT_MEMORY_PATH=/app/data
      - CORTEX_AGENT_LOG_LEVEL=debug
      - CORTEX_AGENT_MAX_AGENTS=15
      - CORTEX_AGENT_SECURITY_MODE=strict
      - CORTEX_AGENT_HNSW_M=16
      - CORTEX_AGENT_HNSW_EF=200
      - CORTEX_AGENT_EMBEDDING_DIM=384
      - CI=true
      - TEST_REPORT_PATH=/app/reports
      - MCP_SERVER_HOST=localhost
      - MCP_SERVER_PORT=3000
    networks:
      - cortex-agent-test
    command: ["bash", "/app/tests/docker-regression/scripts/run-all-tests.sh"]

  # MCP Server for integration tests
  mcp-server:
    build:
      context: ../..
      dockerfile: tests/docker-regression/Dockerfile
    container_name: cortex-agent-mcp-server
    volumes:
      - test-data:/app/data
      - test-logs:/app/logs
    environment:
      - NODE_ENV=test
      - CORTEX_AGENT_MODE=test
      - CORTEX_AGENT_MEMORY_PATH=/app/data
      - CORTEX_AGENT_LOG_LEVEL=info
      - MCP_PORT=3000
    ports:
      - "3000:3000"
    networks:
      - cortex-agent-test
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3000"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: ["npx", "cortex-agent", "mcp", "start", "--port", "3000"]

  # Unit test runner
  unit-tests:
    build:
      context: ../..
      dockerfile: tests/docker-regression/Dockerfile
    container_name: cortex-agent-unit-tests
    volumes:
      - test-reports:/app/reports
    environment:
      - NODE_ENV=test
      - CI=true
      - TEST_REPORT_PATH=/app/reports
    networks:
      - cortex-agent-test
    command: ["bash", "/app/tests/docker-regression/scripts/run-unit-tests.sh"]

  # Integration test runner
  integration-tests:
    build:
      context: ../..
      dockerfile: tests/docker-regression/Dockerfile
    container_name: cortex-agent-integration-tests
    volumes:
      - test-data:/app/data
      - test-reports:/app/reports
    environment:
      - NODE_ENV=test
      - CORTEX_AGENT_MODE=test
      - CORTEX_AGENT_MEMORY_PATH=/app/data
      - CI=true
      - TEST_REPORT_PATH=/app/reports
      - MCP_SERVER_HOST=mcp-server
      - MCP_SERVER_PORT=3000
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - cortex-agent-test
    command: ["bash", "/app/tests/docker-regression/scripts/run-integration-tests.sh"]

  # Performance benchmark runner
  benchmark-tests:
    build:
      context: ../..
      dockerfile: tests/docker-regression/Dockerfile
    container_name: cortex-agent-benchmark-tests
    volumes:
      - test-data:/app/data
      - test-reports:/app/reports
    environment:
      - NODE_ENV=test
      - CORTEX_AGENT_MODE=test
      - CORTEX_AGENT_MEMORY_PATH=/app/data
      - CI=true
      - TEST_REPORT_PATH=/app/reports
    networks:
      - cortex-agent-test
    command: ["bash", "/app/tests/docker-regression/scripts/run-benchmark-tests.sh"]

  # Security test runner
  security-tests:
    build:
      context: ../..
      dockerfile: tests/docker-regression/Dockerfile
    container_name: cortex-agent-security-tests
    volumes:
      - test-reports:/app/reports
    environment:
      - NODE_ENV=test
      - CORTEX_AGENT_SECURITY_MODE=strict
      - CI=true
      - TEST_REPORT_PATH=/app/reports
    networks:
      - cortex-agent-test
    command: ["bash", "/app/tests/docker-regression/scripts/run-security-tests.sh"]

networks:
  cortex-agent-test:
    driver: bridge

volumes:
  test-data:
    driver: local
  test-reports:
    driver: local
  test-logs:
    driver: local
