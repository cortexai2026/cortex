version: '3.8'

services:
  cortex-agent-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cortex-agent-regression-test
    volumes:
      - test-results:/test/results
    environment:
      - NODE_ENV=production
      - CORTEX_AGENT_TEST=true
    command: >
      /bin/bash -c "
        echo '=== Running Regression Tests ===' &&
        /test/regression-tests.sh &&
        echo '' &&
        echo '=== Running Pattern Verification ===' &&
        /test/verify-patterns.sh
      "

volumes:
  test-results:
    driver: local
