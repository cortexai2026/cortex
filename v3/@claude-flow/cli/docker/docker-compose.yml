# Cortex Agent v3.5 — Docker Compose Profiles
#
# Profiles:
#   lite     — MCP server only (stdio), minimal footprint
#   full     — CLI + daemon + all optional deps
#   workers  — Scalable worker pool (extends docker-compose.workers.yml)
#
# Usage:
#   docker compose -f v3/@cortex-agent/cli/docker/docker-compose.yml --profile lite up
#   docker compose -f v3/@cortex-agent/cli/docker/docker-compose.yml --profile full up -d
#   docker compose -f v3/@cortex-agent/cli/docker/docker-compose.yml --profile workers up -d --scale worker=5
#
# Environment (required for full/workers):
#   ANTHROPIC_API_KEY — Your Anthropic API key

services:
  # ── lite: MCP server on stdio (~80MB) ──────────────────────────
  mcp:
    profiles: ["lite"]
    build:
      context: ../../../..
      dockerfile: v3/@cortex-agent/cli/docker/Dockerfile
    image: cortex-agent:lite
    stdin_open: true
    environment:
      - NODE_ENV=production
      - CORTEX_AGENT_MCP_TRANSPORT=stdio
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "cortex-agent", "doctor", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── full: CLI + daemon + optional deps (~800MB) ────────────────
  cortex-agent-full:
    profiles: ["full"]
    build:
      context: ../../../..
      dockerfile: v3/@cortex-agent/cli/docker/Dockerfile.full
    image: cortex-agent:full
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NODE_ENV=production
      - CORTEX_AGENT_LOG_LEVEL=${CORTEX_AGENT_LOG_LEVEL:-info}
      - CORTEX_AGENT_MEMORY_BACKEND=hybrid
    volumes:
      - cortex-agent-state:/home/cortex-agent/.cortex-agent
      - cortex-agent-logs:/var/log/cortex-agent
    ports:
      - "${CORTEX_AGENT_MCP_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 2G
    command: ["cortex-agent", "daemon", "start", "--foreground"]
    healthcheck:
      test: ["CMD", "cortex-agent", "doctor", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── workers: Scalable worker pool ──────────────────────────────
  worker:
    profiles: ["workers"]
    build:
      context: ../../../..
      dockerfile: v3/@cortex-agent/cli/docker/Dockerfile
    image: cortex-agent:lite
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_CODE_HEADLESS=true
      - CLAUDE_CODE_SANDBOX_MODE=${CORTEX_AGENT_SANDBOX:-strict}
      - CORTEX_AGENT_WORKERS=${CORTEX_AGENT_WORKERS:-audit,optimize,testgaps}
      - NODE_ENV=production
    volumes:
      - worker-state:/home/cortex-agent/.cortex-agent
      - worker-logs:/var/log/cortex-agent
    deploy:
      replicas: ${CORTEX_AGENT_WORKER_REPLICAS:-3}
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    command: ["cortex-agent", "daemon", "start", "--foreground", "--headless"]
    healthcheck:
      test: ["CMD", "cortex-agent", "doctor", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  cortex-agent-state:
  cortex-agent-logs:
  worker-state:
  worker-logs:
